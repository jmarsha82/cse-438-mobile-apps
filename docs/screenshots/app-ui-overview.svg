      <rect x="34" y="178" width="26" height="10" rx="2"/>
      <rect x="77" y="178" width="26" height="10" rx="2"/>
      <rect x="120" y="178" width="26" height="10" rx="2"/>
      <rect x="34" y="248" width="26" height="10" rx="2"/>
      <rect x="77" y="248" width="26" height="10" rx="2"/>
