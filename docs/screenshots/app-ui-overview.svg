  <g transform="translate(740 168)">
    <rect width="500" height="650" rx="16" fill="#ffffff" stroke="#d9e1ea"/>
    <text x="36" y="54" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#18212f">What these previews represent</text>
    <text x="36" y="96" font-family="Arial, sans-serif" font-size="16" fill="#475569">Lab1: calculator form, state tax picker, final-price output.</text>
    <text x="36" y="136" font-family="Arial, sans-serif" font-size="16" fill="#475569">Lab2: virtual pet model, shop inventory, feed/play actions.</text>
    <text x="36" y="176" font-family="Arial, sans-serif" font-size="16" fill="#475569">Lab3: touch drawing with Bezier smoothing and color tools.</text>
    <text x="36" y="216" font-family="Arial, sans-serif" font-size="16" fill="#475569">Lab4: OMDb search results, poster grid, details, favorites.</text>
    <text x="36" y="256" font-family="Arial, sans-serif" font-size="16" fill="#475569">Lab5: Lab2 pet care plus SpriteKit scenery and weather toggle.</text>
    <text x="36" y="296" font-family="Arial, sans-serif" font-size="16" fill="#475569">Studio1: slider-controlled image opacity and value label.</text>
    <rect x="36" y="342" width="428" height="150" rx="12" fill="#f8fafc" stroke="#dbe3ef"/>
    <text x="58" y="382" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#334155">Capture note</text>
    <text x="58" y="416" font-family="Arial, sans-serif" font-size="15" fill="#475569">These are static README previews because the current</text>
    <text x="58" y="442" font-family="Arial, sans-serif" font-size="15" fill="#475569">workspace is Windows-only and cannot launch Xcode's</text>
    <text x="58" y="468" font-family="Arial, sans-serif" font-size="15" fill="#475569">iOS Simulator. Replace this image with simulator screenshots</text>
    <text x="58" y="494" font-family="Arial, sans-serif" font-size="15" fill="#475569">after running the apps on macOS if exact runtime captures are needed.</text>
  </g>
