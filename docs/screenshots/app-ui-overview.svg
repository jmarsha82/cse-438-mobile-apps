<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="940" viewBox="0 0 1320 940" role="img" aria-labelledby="title desc">
  <title id="title">CSE 438 iOS coursework UI previews</title>
  <desc id="desc">Documentation preview image showing six iOS app interfaces from the coursework repository.</desc>
  <rect width="1320" height="940" fill="#f4f6f8"/>
  <text x="60" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#18212f">CSE 438 Mobile Apps UI Preview</text>
  <text x="60" y="108" font-family="Arial, sans-serif" font-size="18" fill="#5b6675">Static README preview of the UIKit and SpriteKit interfaces in this coursework repo.</text>

  <g transform="translate(60 150)">
