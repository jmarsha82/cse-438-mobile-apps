  <g transform="translate(500 540)">
    <rect width="180" height="340" rx="28" fill="#111827"/>
    <rect x="12" y="18" width="156" height="304" rx="18" fill="#f8fafc"/>
    <text x="28" y="54" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#334155">Studio1</text>
    <text x="28" y="78" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Slider Alpha Demo</text>
    <rect x="42" y="104" width="96" height="96" rx="14" fill="#94a3b8" opacity="0.72"/>
    <circle cx="90" cy="146" r="28" fill="#ffffff" opacity="0.65"/>
    <text x="75" y="238" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#334155">0.72</text>
    <rect x="34" y="272" width="112" height="8" rx="4" fill="#cbd5e1"/>
    <rect x="34" y="272" width="82" height="8" rx="4" fill="#334155"/>
