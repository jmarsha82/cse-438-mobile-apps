    <g fill="#6366f1">
      <rect x="30" y="144" width="34" height="52" rx="4"/>
      <rect x="73" y="144" width="34" height="52" rx="4"/>
      <rect x="116" y="144" width="34" height="52" rx="4"/>
      <rect x="30" y="214" width="34" height="52" rx="4"/>
      <rect x="73" y="214" width="34" height="52" rx="4"/>
      <rect x="116" y="214" width="34" height="52" rx="4"/>
