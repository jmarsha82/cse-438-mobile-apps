    <text x="28" y="54" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#7c2d12">Lab2</text>
    <text x="28" y="78" font-family="Arial, sans-serif" font-size="11" fill="#9a3412">Virtual Pet</text>
    <circle cx="90" cy="134" r="46" fill="#fde68a" stroke="#f59e0b" stroke-width="3"/>
    <circle cx="74" cy="126" r="5" fill="#1f2937"/>
